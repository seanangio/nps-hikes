name: Docs Lint

# Runs structural (markdownlint), prose (Vale), code block (JSON and bash),
# and build (MkDocs) checks on Markdown files. Triggers on PRs to main and
# pushes to main when docs or linter config change.

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.vale.ini'
      - '.markdownlint-cli2.yaml'
      - 'styles/NPS/**'
      - 'styles/config/**'
      - 'mkdocs.yml'
      - 'scripts/hooks/check_json_codeblocks.py'
      - 'scripts/hooks/check_bash_codeblocks.py'
  pull_request:
    branches: [main]
    paths:
      - '**.md'
      - '.vale.ini'
      - '.markdownlint-cli2.yaml'
      - 'styles/NPS/**'
      - 'styles/config/**'
      - 'mkdocs.yml'
      - 'scripts/hooks/check_json_codeblocks.py'
      - 'scripts/hooks/check_bash_codeblocks.py'

jobs:
  markdown-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'

  vale-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run Vale
        uses: errata-ai/vale-action@v2
        with:
          reporter: github-pr-check
          fail_on_error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bash-codeblocks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Syntax-check bash in Markdown code blocks
        run: python scripts/hooks/check_bash_codeblocks.py **/*.md

  json-codeblocks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate JSON in Markdown code blocks
        run: python scripts/hooks/check_json_codeblocks.py **/*.md

  docs-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build docs (strict)
        run: mkdocs build --strict
