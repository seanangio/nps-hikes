name: Deploy Data

on:
  push:
    branches: [main]
    paths:
      - 'raw_data/**'
  workflow_dispatch:

jobs:
  deploy-data:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nps-hikes .

      - name: Run data pipeline
        run: |
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}/raw_data:/app/raw_data:ro \
            -v ${{ github.workspace }}/logs:/app/logs \
            -e NPS_API_KEY=${{ secrets.NPS_API_KEY }} \
            -e POSTGRES_HOST=${{ secrets.NEON_POSTGRES_HOST }} \
            -e POSTGRES_PORT=5432 \
            -e POSTGRES_DB=${{ secrets.NEON_POSTGRES_DB }} \
            -e POSTGRES_USER=${{ secrets.NEON_POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ secrets.NEON_POSTGRES_PASSWORD }} \
            -e POSTGRES_SSLMODE=require \
            nps-hikes \
            python scripts/orchestrator.py --write-db

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-data-logs
          path: logs/
          retention-days: 7
          if-no-files-found: ignore
