# Pre-commit hooks configuration
# See https://pre-commit.com for more information
#
# Note: Security auditing (pip-audit) is intentionally NOT included here. Security checks run in CI (security-audit.yml).

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.gpkg$
      - id: end-of-file-fixer
        exclude: \.gpkg$
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']  # Prevent accidentally committing large files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']  # Enforce Unix line endings

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      - id: vale
        name: vale
        entry: vale
        args: ['--minAlertLevel=error']
        language: system
        types: [markdown]
        pass_filenames: true

      - id: mypy
        name: mypy
        entry: mypy scripts/ api/ profiling/ config/
        language: system
        types: [python]
        args: [--config-file=pyproject.toml]
        pass_filenames: false

      - id: blacken-docs
        name: Format Python in Markdown code blocks
        entry: blacken-docs
        language: system
        types: [markdown]
        exclude: ^(scratch|reviews)/
        pass_filenames: true

      - id: check-bash-codeblocks
        name: Syntax-check bash in Markdown code blocks
        entry: python scripts/hooks/check_bash_codeblocks.py
        language: system
        types: [markdown]
        pass_filenames: true

      - id: check-json-codeblocks
        name: Validate JSON in Markdown code blocks
        entry: python scripts/hooks/check_json_codeblocks.py
        language: system
        types: [markdown]
        pass_filenames: true

      - id: check-png-optimization
        name: Check PNG optimization
        entry: python scripts/hooks/check_png_optimization.py
        language: system
        types: [png]

      - id: lychee
        name: Check links in Markdown (offline)
        entry: lychee --offline --no-progress
        language: system
        types: [markdown]
        exclude: ^(scratch|reviews)/
